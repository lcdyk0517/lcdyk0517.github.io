<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArkOS4Clone DTB 识别工具 | ArkOS4Clone DTB Identification Tool</title>
    <link rel="stylesheet" href="dtbTools/css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="language-switcher">
                <select id="langSelect" class="lang-select">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <h1 data-i18n="title">🔍 非官方支持掌机 DTB 分析工具</h1>
            <p class="subtitle" data-i18n="subtitle">基于MD5和Panel参数的DTB文件识别 - 仅支持ArkOS4Clone</p>
        </header>

        <div class="main-content">
            <div class="upload-section">
                <div class="info-box">
                    <h3 data-i18n="instructions.title">📋 使用说明</h3>
                    <p data-i18n="instructions.step1">• 上传DTB文件</p>
                    <p data-i18n="instructions.step2">• 自动计算MD5并与已知配置比对</p>
                    <p data-i18n="instructions.step3">• 根据匹配程度提供识别建议</p>
                </div>

                <!-- 暂时禁用详细数据选项
                <div class="debug-toggle" style="margin:15px 0;text-align:center;">
                    <label style="color:var(--primary);font-weight:600;cursor:pointer;">
                        <input type="checkbox" id="debugToggle" style="margin-right:8px;">
                        <span data-i18n="debugToggle">详细数据</span>
                    </label>
                </div>
                -->

                <!-- ☕ Ko-fi 捐赠信息卡片 -->
                <div class="donor-card">
                    <div class="donor-card-header">
                        <span id="donorTitle" class="donor-title-text" data-i18n="donor_title">
                            ☕ 支持开发者 / 最近捐赠
                        </span>
                        <button id="donateButton" type="button" class="donor-button" data-i18n="donor_button">
                            在 Ko-fi 上请我喝咖啡
                        </button>
                    </div>
                    <div id="donorList" class="donor-list">
                        <!-- JS 会自动填充捐赠列表 -->
                    </div>
                </div>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3 data-i18n="upload.drag">拖放DTB文件到此处</h3>
                    <p data-i18n="upload.click">或点击下方按钮选择文件</p>
                    <input type="file" id="fileInput" class="file-input" accept=".dtb,.dtbo">
                    <label for="fileInput" class="file-label" data-i18n="upload.button">选择DTB文件</label>
                    <div class="selected-file" id="selectedFile"></div>
                </div>

                <button class="process-btn" id="processBtn" disabled data-i18n="processBtn">识别DTB文件</button>
                <div class="error-message" id="errorMessage"></div>
            </div>

            <div class="result-section">
                <h3 style="color:#fff;margin-bottom:15px;" data-i18n="result.title">识别结果</h3>
                <div class="result-area" id="resultArea" aria-live="polite">
                    <span class="comment"></span>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <h3 style="color:#fff;" data-i18n="loading.title">正在识别DTB文件...</h3>
                    <p style="color:#ccc;" data-i18n="loading.subtitle">请稍候</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入拆分后的 JS 文件 -->
    <script src="dtbTools/js/md5.js"></script>
    <script src="dtbTools/js/main.js"></script>
    <script>
        // 页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            initDtbTools();
        });
    </script>
</body>

</html>
